name: Actions Lint

on:
  pull_request:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install actionlint
        run: |
          set -euo pipefail
          version="1.7.12"
          asset="actionlint_${version}_linux_amd64.tar.gz"
          checksum_file="actionlint_${version}_checksums.txt"
          base_url="https://github.com/rhysd/actionlint/releases/download/v${version}"

          curl -fsSLO "${base_url}/${asset}"
          curl -fsSLO "${base_url}/${checksum_file}"
          grep "  ${asset}$" "${checksum_file}" | sha256sum -c -
          tar -xzf "${asset}" actionlint

          mkdir -p "${HOME}/.local/bin"
          install -m 0755 actionlint "${HOME}/.local/bin/actionlint"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color
